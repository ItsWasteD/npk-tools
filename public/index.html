<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>NPK-Tool</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
			crossorigin="anonymous"
		/>
		<script
			src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
			integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
			crossorigin="anonymous"
			referrerpolicy="no-referrer"
		></script>
	</head>
	<body class="text-bg-dark">
		<script>
			const CHAPTER_NUMBERS = [113];

			let chapters = [];

			window.onhashchange = () => {
				const chapterNr = location.hash.replace("#", "");
				displayChapter(chapterNr);
			};

			$(async () => {
				$("#chapter").hide();

				await $.getJSON(`data/data.json`, (data) =>
					chapters.push(...data)
				);

				displayChapters();
			});

			function displayChapters() {
				chapters.forEach((chapter) => {
					$("table tbody").append(
						`<tr class='chapter-row' role='button' onclick='(() => location.hash = ${chapter.levelCode})()'><td>${chapter.levelCode}</td><td>${chapter.name}</td></tr></a>`
					);
				});
			}

			function displayChapter(chapterNr) {
				if (chapterNr === "") {
					$("table").show();
					$("#chapter").hide().empty();

					return;
				}

				const chapter = chapters.find(
					(chapter) => chapter.levelCode == chapterNr
				);

				if (chapter) {
					$("table").hide();
					$("#chapter")
						.append(
							`<h3 class='display-6'>${chapter.levelCode} - ${chapter.name}</h2>`
						)
						.append(
							"<div class='accordion' id='accordion'><div class='accordion-item'><h4 class='accordion-header'><button class='accordion-button' type='button' data-bs-toggle='collapse' data-bs-target='#collapseOne' aria-controls='collapseOne'>Accordion Item #1</button></h4></div></div>"
						)
						.show();
				} else {
					console.error(`Chapter ${chapterNr} not found.`);
				}
			}
		</script>
		<div class="container-fluid">
			<h1
				class="display-2 text-center"
				onclick="(() => location.hash = '')()"
			>
				NPK-Tool
			</h1>
			<main class="w-75 mx-auto">
				<table
					class="table table-dark table-striped table-bordered table-responsive rounded-3"
				>
					<thead>
						<tr>
							<th>NPK Kapitel</th>
							<th>Titel</th>
						</tr>
					</thead>
					<tbody>
						<tr></tr>
					</tbody>
				</table>
				<div
					id="chapter"
					class="container-fluid border border-white rounded-2 p-2"
				></div>
			</main>
		</div>
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
			integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
			crossorigin="anonymous"
		></script>
	</body>
</html>
